<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Vault</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 30px 20px; }
  h1 { text-align: center; color: #2c3e50; margin-bottom: 24px; }

  .upload-box {
    background: white; border: 2px dashed #4a90d9; border-radius: 10px;
    padding: 30px; text-align: center; max-width: 600px;
    margin: 0 auto 30px; cursor: pointer; transition: background 0.2s;
  }
  .upload-box:hover { background: #eaf3ff; }
  .upload-box input { display: none; }
  .upload-box label { cursor: pointer; font-size: 1.1em; color: #4a90d9; }
  #fileName { margin-top: 10px; color: #555; font-size: 0.9em; }
  .btn {
    margin-top: 14px; padding: 10px 24px; background: #4a90d9;
    color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em;
  }
  .btn:hover { background: #357abd; }
  .btn.danger { background: #e74c3c; }
  .btn.danger:hover { background: #c0392b; }

  .progress-bar { display: none; width: 100%; height: 8px; background: #ddd; border-radius: 4px; margin-top: 12px; }
  .progress-bar .fill { height: 100%; background: #4a90d9; border-radius: 4px; width: 0%; transition: width 0.2s; }

  h2 { max-width: 700px; margin: 0 auto 12px; color: #2c3e50; }
  #fileList { max-width: 700px; margin: 0 auto; list-style: none; }

  .file-card {
    background: white; border-radius: 10px; padding: 14px 16px;
    margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .preview-thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .audio-thumb, .doc-thumb { width: 70px; height: 70px; display: flex; align-items: center;
    justify-content: center; font-size: 2em; background: #f0f2f5; border-radius: 6px; flex-shrink: 0; }
  .file-info { flex: 1; }
  .file-name { font-weight: bold; color: #2c3e50; word-break: break-all; }
  .file-meta { font-size: 0.8em; color: #888; margin-top: 3px; }
  .file-actions { display: flex; gap: 8px; flex-shrink: 0; }

  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #2c3e50; color: white; padding: 10px 24px; border-radius: 20px;
    display: none; font-size: 0.95em; z-index: 999;
  }
</style>
</head>
<body>

<h1>📁 File Vault</h1>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" onchange="handleFileSelect(event)">
  <label>Click to choose a file</label>
  <div id="fileName">No file selected</div>
  <button class="btn" onclick="event.stopPropagation(); uploadFile()">⬆ Upload</button>
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
</div>

<h2>Uploaded Files</h2>
<ul id="fileList"><li style="text-align:center;color:#888">Loading...</li></ul>

<div id="toast"></div>

<script>
  let selectedFile = null;

  function handleFileSelect(e) {
    selectedFile = e.target.files[0];
    document.getElementById('fileName').textContent = selectedFile
      ? `Selected: ${selectedFile.name}` : 'No file selected';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  async function uploadFile() {
    if (!selectedFile) return showToast('Please select a file first');

    const formData = new FormData();
    formData.append('file', selectedFile);

    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    bar.style.display = 'block';
    fill.style.width = '0%';

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload');

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable)
        fill.style.width = Math.round((e.loaded / e.total) * 100) + '%';
    };

    xhr.onload = () => {
      bar.style.display = 'none';
      if (xhr.status === 200) {
        showToast('Upload successful!');
        document.getElementById('fileInput').value = '';
        document.getElementById('fileName').textContent = 'No file selected';
        selectedFile = null;
        loadFiles();
      } else {
        showToast('Upload failed');
      }
    };

    xhr.onerror = () => { bar.style.display = 'none'; showToast('Upload error'); };
    xhr.send(formData);
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function getIcon(mime) {
    if (!mime) return '📄';
    if (mime.startsWith('image/')) return null;
    if (mime.startsWith('video/')) return '🎬';
    if (mime.startsWith('audio/')) return '🎵';
    if (mime.includes('pdf')) return '📕';
    if (mime.includes('word') || mime.includes('document')) return '📘';
    if (mime.includes('spreadsheet') || mime.includes('excel')) return '📗';
    if (mime.includes('zip') || mime.includes('rar')) return '🗜️';
    return '📄';
  }

  async function loadFiles() {
    const list = document.getElementById('fileList');
    const res = await fetch('/files');
    const files = await res.json();

    if (!files.length) {
      list.innerHTML = '<li style="text-align:center;color:#888;padding:20px">No files uploaded yet.</li>';
      return;
    }

    list.innerHTML = '';
    files.forEach(file => {
      const li = document.createElement('li');
      li.className = 'file-card';

      const icon = getIcon(file.mimetype);
      let thumbHTML;

      if (!icon && file.mimetype && file.mimetype.startsWith('image/')) {
        thumbHTML = `<img class="preview-thumb" src="/preview/${file.id}" alt="${file.original_name}">`;
      } else {
        thumbHTML = `<div class="${file.mimetype && file.mimetype.startsWith('audio/') ? 'audio-thumb' : 'doc-thumb'}">${icon}</div>`;
      }

      const date = new Date(file.upload_date).toLocaleString();

      li.innerHTML = `
        ${thumbHTML}
        <div class="file-info">
          <div class="file-name">${file.original_name}</div>
          <div class="file-meta">${formatSize(file.size)} &bull; ${file.mimetype || 'unknown'} &bull; ${date}</div>
        </div>
        <div class="file-actions">
          <a href="/download/${file.id}"><button class="btn">⬇ Download</button></a>
          <button class="btn danger" onclick="deleteFile(${file.id})">🗑 Delete</button>
        </div>
      `;
      list.appendChild(li);
    });
  }

  async function deleteFile(id) {
    if (!confirm('Delete this file?')) return;
    await fetch(`/files/${id}`, { method: 'DELETE' });
    showToast('File deleted');
    loadFiles();
  }

  loadFiles();
</script>

</body>
</html>
